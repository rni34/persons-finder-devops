apiVersion: v1
kind: LimitRange
metadata:
  name: persons-finder
  namespace: persons-finder
  labels:
    app.kubernetes.io/name: persons-finder
    app.kubernetes.io/component: governance
    app.kubernetes.io/part-of: persons-finder
spec:
  limits:
    - type: Container
      default:
        # CPU limit intentionally omitted — avoids CFS throttling on JVM workloads
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        # CPU max omitted — allows burstable CPU for JIT/GC-heavy workloads
        memory: 4Gi
      min:
        cpu: 50m
        memory: 64Mi
