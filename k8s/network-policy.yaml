apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: persons-finder
  namespace: persons-finder
  labels:
    app.kubernetes.io/name: persons-finder
    app.kubernetes.io/component: network
    app.kubernetes.io/part-of: persons-finder
spec:
  podSelector:
    matchLabels:
      app: persons-finder
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow app traffic from ALB ingress controller (port 8080 only)
    - ports:
        - port: 8080
          protocol: TCP
    # Allow management port (8081) from monitoring namespace only (Prometheus scraping).
    # Kubelet probes also use 8081 but are always allowed per K8s spec:
    # "the only allowed connections into the pod are those from the pod's node
    # and those allowed by the ingress list" — node traffic bypasses NetworkPolicy.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8081
          protocol: TCP
  egress:
    # Allow DNS — restricted to CoreDNS pods in kube-system only.
    # Without a destination selector, DNS egress is open to ANY IP on port 53,
    # enabling DNS tunneling: a compromised pod encodes data in DNS queries to
    # an attacker-controlled nameserver, bypassing the HTTPS-only egress rule.
    # Targeting kube-dns pods ensures DNS queries only reach the cluster resolver.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS outbound (OpenAI API, Secrets Manager)
    # NOTE: Standard K8s NetworkPolicy cannot restrict egress by FQDN/domain name,
    # only by IP/CIDR. This rule allows HTTPS to ANY IP — it is intentionally broad
    # as a baseline. For FQDN-based egress restriction (e.g., only api.openai.com),
    # use Cilium CiliumNetworkPolicy with toFQDNs. See ARCHITECTURE.md section 6c.
    - ports:
        - port: 443
          protocol: TCP
