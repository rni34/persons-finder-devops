apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: persons-finder
  namespace: persons-finder
spec:
  podSelector:
    matchLabels:
      app: persons-finder
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ALB ingress controller
    - ports:
        - port: 8080
          protocol: TCP
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS outbound (OpenAI API, Secrets Manager)
    - ports:
        - port: 443
          protocol: TCP
