apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: persons-finder
  namespace: persons-finder
  labels:
    app: persons-finder
spec:
  selector:
    matchLabels:
      app: persons-finder
  endpoints:
    - port: http
      targetPort: 8080
      path: /actuator/prometheus
      interval: 15s
