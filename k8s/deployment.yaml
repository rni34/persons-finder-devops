apiVersion: apps/v1
kind: Deployment
metadata:
  name: persons-finder
  namespace: persons-finder
  labels:
    app: persons-finder
    app.kubernetes.io/name: persons-finder
    app.kubernetes.io/instance: persons-finder
    app.kubernetes.io/version: 0.0.1-SNAPSHOT
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: persons-finder
    app.kubernetes.io/managed-by: kubectl
spec:
  # replicas managed by HPA — do not set here to avoid conflicts
  selector:
    matchLabels:
      app: persons-finder
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: persons-finder
        app.kubernetes.io/name: persons-finder
        app.kubernetes.io/instance: persons-finder
        app.kubernetes.io/version: 0.0.1-SNAPSHOT
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: persons-finder
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45  # 10s preStop + 30s graceful shutdown + 5s buffer
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: persons-finder
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: persons-finder
          # Replace with your ECR image URI — CI pushes SHA-tagged images:
          #   <account>.dkr.ecr.<region>.amazonaws.com/persons-finder:<git-sha>
          image: 637423556985.dkr.ecr.us-east-1.amazonaws.com/persons-finder:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: OPENAI_API_KEY
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: persons-finder
  namespace: persons-finder
  labels:
    app.kubernetes.io/name: persons-finder
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: persons-finder
