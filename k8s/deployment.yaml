apiVersion: apps/v1
kind: Deployment
metadata:
  name: persons-finder
  namespace: persons-finder
  labels:
    app: persons-finder
spec:
  replicas: 2
  selector:
    matchLabels:
      app: persons-finder
  template:
    metadata:
      labels:
        app: persons-finder
    spec:
      serviceAccountName: persons-finder
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: persons-finder
          image: 637423556985.dkr.ecr.us-east-1.amazonaws.com/persons-finder:v3-observability
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: OPENAI_API_KEY
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: persons-finder
  namespace: persons-finder
