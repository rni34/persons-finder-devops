apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply order: namespace and governance first, then workloads, then networking and monitoring
resources:
  # 1. Namespace and governance
  - namespace.yaml
  - resource-quota.yaml
  - limit-range.yaml
  - admission-policy.yaml
  # 2. Secrets and service accounts
  - external-secret.yaml
  # 3. Workloads
  - priority-class.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  # 4. Scaling and availability
  - hpa.yaml
  - pdb.yaml
  # 5. Network security
  - default-deny.yaml
  - network-policy.yaml
  # 6. Monitoring
  - service-monitor.yaml
  - prometheus-rules.yaml
  - alertmanager-config.yaml
  - grafana-dashboard.yaml
