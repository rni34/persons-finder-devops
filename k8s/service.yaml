apiVersion: v1
kind: Service
metadata:
  name: persons-finder
  namespace: persons-finder
  labels:
    app: persons-finder
    app.kubernetes.io/name: persons-finder
    app.kubernetes.io/instance: persons-finder
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: persons-finder
spec:
  type: ClusterIP
  selector:
    app: persons-finder
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: management
      port: 8081
      targetPort: 8081
      protocol: TCP
