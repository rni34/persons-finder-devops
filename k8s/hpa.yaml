apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: persons-finder
  namespace: persons-finder
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: persons-finder
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
