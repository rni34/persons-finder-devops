# --- ServiceAccount with IRSA annotation (in persons-finder namespace) ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-sa
  namespace: persons-finder
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::637423556985:role/persons-finder-eso"
---
# --- SecretStore: tells ESO how to connect to AWS Secrets Manager ---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: persons-finder
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: eso-sa
---
# --- ExternalSecret: syncs the secret into a K8s Secret ---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openai-api-key
  namespace: persons-finder
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: openai-secret
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: persons-finder/openai-api-key
        property: OPENAI_API_KEY
