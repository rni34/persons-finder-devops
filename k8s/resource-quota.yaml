apiVersion: v1
kind: ResourceQuota
metadata:
  name: persons-finder
  namespace: persons-finder
  labels:
    app.kubernetes.io/name: persons-finder
    app.kubernetes.io/component: governance
    app.kubernetes.io/part-of: persons-finder
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    # CPU limits intentionally omitted — aligns with ADR-0001 (no CPU limits for JVM).
    # LimitRange also omits default CPU limit. Only memory limits are enforced.
    limits.memory: 16Gi
    pods: "20"
