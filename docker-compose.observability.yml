# Local observability stack for persons-finder development.
# Usage: docker compose -f docker-compose.observability.yml up -d
# Requires: the app running on localhost:8080 with actuator/prometheus enabled.
#
# Image versions pinned for reproducibility and supply chain safety.
# Update: https://github.com/prometheus/prometheus/releases
#          https://github.com/grafana/grafana/releases

services:
  prometheus:
    # LTS release — receives backported security fixes without feature churn.
    # v2.51.0 (March 2024) was 2 years behind with no security patches.
    image: prom/prometheus:v3.5.1
    container_name: pf-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped

  grafana:
    # v10.4.1 had known CVEs: CVE-2024-9264 (critical SQLi), CVE-2025-4123 (high XSS).
    image: grafana/grafana:11.6.0
    container_name: pf-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
